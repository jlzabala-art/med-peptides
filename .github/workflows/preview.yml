name: Preview Channel
on:
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Lint, Test, Build & Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit Tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Deploy to Firebase Preview Channel
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          XDG_CONFIG_HOME=./.firebase-config npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} --expires 7d --project med-peptides-app --token "$FIREBASE_TOKEN"
