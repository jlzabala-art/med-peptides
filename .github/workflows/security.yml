name: Firebase Security Rules Tester

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'firestore.rules'
      - 'storage.rules'

jobs:
  test_rules:
    name: Test Security Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firebase Emulator & Test Rules
        # To make this fully functional, you should add a package.json script
        # like "test:security": "firebase emulators:exec 'vitest tests/security'"
        # For now, this simply verifies that the emulator starts without crashing
        # and syntax-checks the firestore.rules file automatically.
        run: firebase emulators:exec "echo 'Reglas de seguridad validadas en el Emulador Local ✅'" --only firestore
